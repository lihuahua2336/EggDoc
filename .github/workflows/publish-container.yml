name: Publish container image

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-container-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security:
    name: Scan repository secrets
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository history
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Scan for committed secrets
        uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Build and publish container
    needs: security
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate public build configuration
        env:
          EGGDOC_SITE_URL: ${{ vars.EGGDOC_SITE_URL }}
          PUBLIC_EGGAI_BASE_URL: ${{ vars.PUBLIC_EGGAI_BASE_URL }}
          PUBLIC_INSTALLER_ORIGIN: ${{ vars.PUBLIC_INSTALLER_ORIGIN }}
        run: |
          test -n "$EGGDOC_SITE_URL"
          test -n "$PUBLIC_EGGAI_BASE_URL"
          test -n "$PUBLIC_INSTALLER_ORIGIN"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Sign in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: metadata
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/eggdoc
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=ref,event=tag

      - name: Build and publish image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          build-args: |
            EGGDOC_SITE_URL=${{ vars.EGGDOC_SITE_URL }}
            PUBLIC_EGGAI_BASE_URL=${{ vars.PUBLIC_EGGAI_BASE_URL }}
            PUBLIC_INSTALLER_ORIGIN=${{ vars.PUBLIC_INSTALLER_ORIGIN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true
