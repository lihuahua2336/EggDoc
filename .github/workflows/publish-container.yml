name: Publish container image

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-container-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security:
    name: Scan repository secrets
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Scan for committed secrets
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Build and publish container
    needs: security
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate public build configuration
        env:
          EGGDOC_SITE_URL: ${{ vars.EGGDOC_SITE_URL }}
          PUBLIC_EGGAI_BASE_URL: ${{ vars.PUBLIC_EGGAI_BASE_URL }}
          PUBLIC_INSTALLER_ORIGIN: ${{ vars.PUBLIC_INSTALLER_ORIGIN }}
        run: |
          test -n "$EGGDOC_SITE_URL"
          test -n "$PUBLIC_EGGAI_BASE_URL"
          test -n "$PUBLIC_INSTALLER_ORIGIN"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Sign in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: metadata
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/eggdoc
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and publish image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          build-args: |
            EGGDOC_SITE_URL=${{ vars.EGGDOC_SITE_URL }}
            PUBLIC_EGGAI_BASE_URL=${{ vars.PUBLIC_EGGAI_BASE_URL }}
            PUBLIC_INSTALLER_ORIGIN=${{ vars.PUBLIC_INSTALLER_ORIGIN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true
